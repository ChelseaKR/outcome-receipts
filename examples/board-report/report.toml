# A board report for the same housing program. It is shorter and higher-level
# than the grant report: a brief summary, a trend chart of clients served across
# the two quarters, a comparison table of the headline outcomes, and a board
# reconciliation that places each outcome figure next to the program spend it took,
# with the period-over-period change. Every number is a figure with a receipt, and
# the chart, the comparison, and the reconciliation are held to the same grounding
# gate as the narrative.
#
#   receipts run --config examples/board-report/report.toml --out out/board

[data]
path = "services.csv"

[report]
title = "Housing Program Board Report"
template = """
Summary for the board. The program served {clients_served} clients this period \
and exited {pct_permanent} of them to permanent housing. The trend chart shows \
clients served by quarter, and the comparison table reports how each headline \
outcome moved from the prior quarter to the current quarter. The board reconciliation then \
sets each outcome figure beside the program spend it took, with the change across \
both quarters.
"""

[metrics.clients_served]
description = "Distinct clients with any enrollment in the period."
definition = "Each person enrolled in the housing program during the period, counted once by client_id even if they enrolled more than once. The unit is the person, not the enrollment."
unit = "count"
value_sql = "SELECT COUNT(DISTINCT client_id) FROM data"
slice_sql = "SELECT client_id FROM data"

[metrics.pct_permanent]
description = "Share of exits that went to permanent housing."
definition = "Permanent-housing exits divided by all exits in the period, as a whole-number percent. The denominator is exits, not all enrolled clients, so a client still enrolled is not in it."
unit = "percent"
decimals = 0
value_sql = "SELECT ROUND(100.0 * SUM(CASE WHEN exit_destination = 'permanent' THEN 1 ELSE 0 END) / COUNT(*)) FROM data WHERE exit_date != ''"
slice_sql = "SELECT * FROM data WHERE exit_date != ''"

[[charts]]
id = "clients-by-quarter"
title = "Clients served by quarter"
kind = "line"
metrics = ["clients_served__q1", "clients_served__q2"]
labels = ["Q1 2025", "Q2 2025"]

[comparison]
current = "q2"
prior = "q1"

[[comparison.periods]]
id = "q1"
label = "Q1 2025"
predicate = "enrolled_date >= '2025-01-01' AND enrolled_date < '2025-04-01'"

[[comparison.periods]]
id = "q2"
label = "Q2 2025"
predicate = "enrolled_date >= '2025-04-01' AND enrolled_date < '2025-07-01'"

[comparison.metrics.clients_served]
description = "Distinct clients enrolled in the quarter."
definition = "Distinct clients by client_id whose enrollment date falls in the quarter. A client enrolled in both quarters counts in each."
unit = "count"
value_sql = "SELECT COUNT(DISTINCT client_id) FROM data WHERE {period}"
slice_sql = "SELECT client_id FROM data WHERE {period}"

[comparison.metrics.exits_permanent]
description = "Permanent-housing exits, by quarter of enrollment."
definition = "Permanent-housing exits grouped by the quarter the client enrolled in. Destination is taken as recorded."
unit = "count"
value_sql = "SELECT COUNT(*) FROM data WHERE exit_destination = 'permanent' AND ({period})"
slice_sql = "SELECT * FROM data WHERE exit_destination = 'permanent' AND ({period})"

[comparison.metrics.pct_permanent]
description = "Permanent-housing rate, by quarter of enrollment."
definition = "Permanent-housing exits divided by all exits, within the quarter of enrollment, as a whole-number percent. The change between quarters is in percentage points."
unit = "percent"
decimals = 0
value_sql = "SELECT ROUND(100.0 * SUM(CASE WHEN exit_destination = 'permanent' THEN 1 ELSE 0 END) / COUNT(*)) FROM data WHERE exit_date != '' AND ({period})"
slice_sql = "SELECT * FROM data WHERE exit_date != '' AND ({period})"

# The board reconciliation pairs a receipted outcome figure with the financial line
# it relates to, over the same two quarters, and reports the change in each. Both
# numbers on a row, and each change, are figures with receipts: the change is one
# subtracting query, not arithmetic over the page, exactly as in the comparison.

[reconciliation]
current = "q2"
prior = "q1"

[[reconciliation.periods]]
id = "q1"
label = "Q1 2025"
predicate = "enrolled_date >= '2025-01-01' AND enrolled_date < '2025-04-01'"

[[reconciliation.periods]]
id = "q2"
label = "Q2 2025"
predicate = "enrolled_date >= '2025-04-01' AND enrolled_date < '2025-07-01'"

[[reconciliation.rows]]
label = "Permanent-housing exits vs. program spend"

[reconciliation.rows.outcome]
description = "Permanent-housing exits, by quarter of enrollment."
definition = "Permanent-housing exits grouped by the quarter the client enrolled in. Destination is taken as recorded."
unit = "count"
value_sql = "SELECT COUNT(*) FROM data WHERE exit_destination = 'permanent' AND ({period})"
slice_sql = "SELECT * FROM data WHERE exit_destination = 'permanent' AND ({period})"

[reconciliation.rows.financial]
description = "Program spend in the quarter (USD)."
definition = "Sum of recorded per-client program cost for clients whose enrollment date falls in the quarter, in whole dollars."
unit = "count"
value_sql = "SELECT CAST(COALESCE(SUM(CAST(cost AS REAL)), 0) AS INTEGER) FROM data WHERE ({period})"
slice_sql = "SELECT * FROM data WHERE ({period})"
