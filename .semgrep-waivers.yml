# Semgrep waiver ledger (SEC-10 hygiene anchor).
#
# `semgrep scan` (p/default + p/python) runs blocking on every PR in the `security` job
# (see .github/workflows/ci.yml). Suppressions live inline as `# nosemgrep: <rule-id>` next to
# (or immediately above) the flagged line — semgrep's own mechanism; this file does not configure
# semgrep itself. This ledger is the single place a reviewer can see every active waiver, why it
# exists, and when it was added, so a waiver can't quietly go stale or multiply unnoticed. Every
# entry here must have a matching `# nosemgrep:` comment in the code.
#
# Adding a new waiver: get sign-off in the PR description (why this is a true false-positive, not
# a fix-later), add the inline comment, then add a row here. Removing a waiver: delete both the
# code comment and this row in the same PR.

waivers:
  - rule_id: python37-compatibility-importlib2
    locations:
      - src/outcome_receipts/copy.py (packaged gettext catalog loading)
    added: 2026-07-12
    last_reviewed: 2026-07-12
    tracking_issue: https://github.com/ChelseaKR/outcome-receipts/issues/53
    reason: >
      The rule protects Python versions below 3.7. This package requires Python
      3.12, and importlib.resources is the standard-library mechanism for loading
      packaged gettext catalogs without filesystem-path assumptions. A scan with
      nosemgrep disabled confirmed that Semgrep 1.168.0's combined p/default and
      p/python profile still reports this rule, so the waiver remains necessary.
  - rule_id: sqlalchemy-execute-raw-query
    locations:
      - src/outcome_receipts/engine.py (load_table, CREATE TABLE)
    added: 2026-07-10
    tracking_issue: https://github.com/ChelseaKR/outcome-receipts/issues/52
    reason: >
      Same false positive already documented for ruff's S608 on this function: `table` defaults
      to the "data" constant everywhere it is called (grep confirms no caller passes a dynamic
      value), and `columns` are CSV header names read as identifiers, not values; both pass
      through _quote_ident, which doubles any embedded double-quote. Neither is user-supplied in
      the request-body sense the rule guards against. This is stdlib sqlite3, not SQLAlchemy —
      the rule's message is generic to any raw-SQL f-string, which is why it also fires here.
      (2026-07-11: the empty-rows branch no longer executes SQL — FIX-07 made it raise
      LoaderError — so the waiver covers the single remaining CREATE TABLE call.)
