# SPDX-License-Identifier: Apache-2.0
name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing signed stable SemVer tag (vX.Y.Z)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  verify-build:
    name: verify signed tag · build exact artifacts
    runs-on: ubuntu-latest
    outputs:
      release_commit: ${{ steps.tag.outputs.commit }}
      release_tag: ${{ steps.tag.outputs.tag }}
      tag_object_sha: ${{ steps.tag.outputs.tag_object_sha }}
    permissions:
      contents: read
    steps:
      - name: Checkout trusted main with complete history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve the reviewed signed tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          TAG="${INPUT_TAG}"
          test "${GITHUB_REF}" = refs/heads/main
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          test "$(git rev-parse origin/main)" = "${GITHUB_SHA}"
          if [[ ! "${TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::Release tag '${TAG}' must be stable SemVer (vX.Y.Z)."
            exit 1
          fi
          git fetch --force origin "refs/tags/${TAG}:refs/tags/${TAG}"
          if [ "$(git cat-file -t "refs/tags/${TAG}")" != tag ]; then
            echo "::error::Release tag '${TAG}' must be an annotated tag object."
            exit 1
          fi
          TAG_COMMIT="$(git rev-parse --verify --end-of-options "${TAG}^{commit}")"
          if ! git merge-base --is-ancestor "${TAG_COMMIT}" origin/main; then
            echo "::error::Release tag '${TAG}' is not on reviewed main history."
            exit 1
          fi
          TAG_OBJECT_SHA="$(git rev-parse "refs/tags/${TAG}")"
          {
            echo "tag=${TAG}"
            echo "commit=${TAG_COMMIT}"
            echo "tag_object_sha=${TAG_OBJECT_SHA}"
          } >> "${GITHUB_OUTPUT}"

      - name: Verify the maintainer's SSH tag signature
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          git config gpg.format ssh
          git config gpg.ssh.allowedSignersFile "${GITHUB_WORKSPACE}/.github/allowed_signers"
          git verify-tag -- "${TAG}"

      - name: Check out the exact verified release commit
        env:
          RELEASE_COMMIT: ${{ steps.tag.outputs.commit }}
        run: |
          set -euo pipefail
          git checkout --detach "${RELEASE_COMMIT}"
          test "$(git rev-parse HEAD)" = "${RELEASE_COMMIT}"

      - name: Guard tag, package, and changelog version parity
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          TAG_VERSION="${TAG#v}"
          PACKAGE_VERSION="$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')"
          test "${TAG_VERSION}" = "${PACKAGE_VERSION}"
          grep -q "^## \[${TAG_VERSION}\]" CHANGELOG.md

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.11.19"
          enable-cache: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          package-manager-cache: false
      - name: Install and smoke-check the complete toolchain
        run: make install-smoke
      - name: Run the full merge gate at the tagged commit
        run: make verify
      - name: Confirm model and data cards match their generator
        run: uv run receipts cards --out docs/cards --check
      - name: Build wheel and source distribution
        run: uv build

      - name: Generate the CycloneDX 1.7 runtime SBOM
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          uv venv --python 3.12 .sbom-venv
          uv pip install --python .sbom-venv/bin/python dist/*.whl
          uvx --from cyclonedx-bom==7.3.0 cyclonedx-py environment .sbom-venv/bin/python \
            --pyproject pyproject.toml \
            --mc-type library \
            --spec-version 1.7 \
            --output-reproducible \
            --output-format JSON \
            --validate \
            --output-file dist/outcome-receipts.cdx.json
          SERIAL_NUMBER="$(
            .sbom-venv/bin/python -c \
              'import os, uuid; print("urn:uuid:" + str(uuid.uuid5(uuid.NAMESPACE_URL, "https://github.com/ChelseaKR/outcome-receipts/releases/tag/" + os.environ["TAG"])))'
          )"
          jq --arg serial_number "${SERIAL_NUMBER}" \
            '.serialNumber = $serial_number' \
            dist/outcome-receipts.cdx.json > dist/outcome-receipts.cdx.tmp
          mv dist/outcome-receipts.cdx.tmp dist/outcome-receipts.cdx.json
          jq -e \
            '.bomFormat == "CycloneDX" and .specVersion == "1.7" and (.serialNumber | startswith("urn:uuid:"))' \
            dist/outcome-receipts.cdx.json >/dev/null

      - name: Record distribution digests
        run: (cd dist && sha256sum ./*.whl ./*.tar.gz > SHA256SUMS)
      - name: Hand verified distributions to the PyPI publisher
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pypi-distributions
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 7
      - name: Hand verified assets to the checkout-free release publisher
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-assets
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish-release:
    name: recheck tag · attest · publish without checkout
    needs: verify-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download only assets produced by the read-only verifier
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-assets
          path: dist

      - name: Recheck the immutable tag object before publication
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.verify-build.outputs.release_tag }}
          TAG_OBJECT_SHA: ${{ needs.verify-build.outputs.tag_object_sha }}
        run: |
          set -euo pipefail
          LIVE_TAG_OBJECT="$(
            gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" --jq .object.sha
          )"
          test "${LIVE_TAG_OBJECT}" = "${TAG_OBJECT_SHA}"

      - name: Attest the exact distributions
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: "dist/*.whl,dist/*.tar.gz"
      - name: Attest the exact SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: "dist/*.whl,dist/*.tar.gz"
          sbom-path: "dist/outcome-receipts.cdx.json"
      - name: Download the portable attestation bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/outcome-receipts-attestations
          (
            cd /tmp/outcome-receipts-attestations
            gh attestation download "${GITHUB_WORKSPACE}"/dist/*.whl \
              --repo "${GITHUB_REPOSITORY}"
          )
          cat /tmp/outcome-receipts-attestations/sha256*.jsonl \
            > dist/outcome-receipts.intoto.jsonl

      - name: Publish the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.verify-build.outputs.release_tag }}
        run: |
          set -euo pipefail
          gh release view "${TAG}" >/dev/null 2>&1 \
            || gh release create "${TAG}" --verify-tag \
              --title "outcome-receipts ${TAG}" --generate-notes
          gh release upload "${TAG}" dist/* --clobber

  pypi-publish:
    name: publish exact verified bytes to PyPI
    needs: [verify-build, publish-release]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/outcome-receipts
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download the verified distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: pypi-distributions
          path: dist
      - name: Recheck the transferred distribution set
        env:
          RELEASE_COMMIT: ${{ needs.verify-build.outputs.release_commit }}
          RELEASE_TAG: ${{ needs.verify-build.outputs.release_tag }}
        run: |
          set -euo pipefail
          cd dist
          sha256sum -c SHA256SUMS
          rm SHA256SUMS
          mapfile -t WHEELS < <(find . -maxdepth 1 -type f -name '*.whl' -print)
          mapfile -t SDISTS < <(find . -maxdepth 1 -type f -name '*.tar.gz' -print)
          mapfile -t ALL_FILES < <(find . -maxdepth 1 -type f -print)
          test "${#WHEELS[@]}" -eq 1
          test "${#SDISTS[@]}" -eq 1
          test "${#ALL_FILES[@]}" -eq 2
          echo "Publishing ${RELEASE_TAG} from reviewed commit ${RELEASE_COMMIT}."
      - name: Publish through PyPI Trusted Publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  verify-published:
    name: verify published package and attestations
    needs: [verify-build, publish-release, pypi-publish]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: read
    steps:
      - name: Download the verified distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: pypi-distributions
          path: dist
      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.11.19"
          enable-cache: false
      - name: Verify GitHub's Sigstore-backed attestation
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh attestation verify dist/*.whl --repo "${GITHUB_REPOSITORY}"
      - name: Install the published version from PyPI and smoke-test it
        env:
          RELEASE_TAG: ${{ needs.verify-build.outputs.release_tag }}
        run: |
          uvx --refresh --from "outcome-receipts==${RELEASE_TAG#v}" \
            receipts --help >/dev/null
