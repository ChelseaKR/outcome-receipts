name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default token.
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to tags here for readability; pinned to commit SHAs
      # before the first tagged release per the supply-chain standard.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      # Drive CI through the Makefile so it runs the same path as `make verify`.
      - name: Install
        run: make install
      - name: Verify (ruff, mypy --strict, pytest)
        run: make verify
      - name: Eval report is current
        run: |
          make eval
          git diff --exit-code eval/report.md
